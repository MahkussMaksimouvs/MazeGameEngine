<body>

<div id="toolbar">
    <button onclick="currentTool='wall'">Wall</button>
<button onclick="currentTool='goal'">Goal</button>
<button onclick="currentTool='key'">Key</button>
<button onclick="currentTool='door'">Door</button>
<button onclick="editorMode()">Editor</button>
<button onclick="playMode()">Play</button>
<button onclick="saveProject()">Save</button>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = "editor";
let currentTool = "wall";
let gameWon = false;
let hasKey = false;

const keys = {};

const project = {
    objects:[]
};

const player = {
    x:100,
    y:100,
    width:30,
    height:30,
    speed:250
};

window.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

canvas.addEventListener("mousedown",e=>{

    if(mode !== "editor") return;

    const rect = canvas.getBoundingClientRect();

    const x = Math.floor(
        (e.clientX - rect.left)/40
    ) * 40;

    const y = Math.floor(
        (e.clientY - rect.top)/40
    ) * 40;

    if(e.button === 0){

        project.objects.push({
    type:currentTool,
    x,
    y,
    width:40,
    height:40
});

    }

    if(e.button === 2){

        project.objects =
            project.objects.filter(obj =>
                !(obj.x === x && obj.y === y)
            );

    }

});

function editorMode(){
    mode = "editor";
}

function playMode(){

    mode = "play";
	 gameWon = false;
    hasKey = false;

    player.x = 100;
    player.y = 100;

}

async function saveProject(){

    try{

        const handle =
            await window.showSaveFilePicker({

            suggestedName:"MyGame.json",

            types:[{
                description:"Game Project",
                accept:{
                    "application/json":[".json"]
                }
            }]
        });

        const writable =
            await handle.createWritable();

        await writable.write(
            JSON.stringify(project,null,2)
        );

        await writable.close();

        alert("Project saved!");

    }catch(err){

        console.log(err);

    }

}

async function loadProject(){

    try{

        const [handle] =
            await window.showOpenFilePicker({

            types:[{
                description:"Game Project",
                accept:{
                    "application/json":[".json"]
                }
            }]
        });

        const file =
            await handle.getFile();

        const text =
            await file.text();

        const data =
            JSON.parse(text);

        project.objects =
            data.objects || [];

        alert("Project loaded!");

    }catch(err){

        console.log(err);

    }

}

function drawGrid(){

    ctx.strokeStyle = "#333";

    for(let x=0;x<canvas.width;x+=40){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();

    }

    for(let y=0;y<canvas.height;y+=40){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);

}
