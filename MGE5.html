<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Game Engine</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

#toolbar{
    background:#222;
    padding:10px;
    display:flex;
    gap:8px;
    flex-wrap: wrap;
}

button{
    padding:8px 12px;
    cursor:pointer;
}

canvas{
    display:block;
    margin:auto;
    background:#223;
    border:2px solid white;
}
</style>
</head>
<body>

<div id="toolbar">
    <button onclick="currentTool='spawn'">Spawn Point</button>
    <button onclick="currentTool='wall'">Wall</button>
    <button onclick="currentTool='goal'">Goal</button>
    <button onclick="currentTool='key'">Key</button>
    <button onclick="currentTool='door'">Door</button>
    <button onclick="editorMode()">Editor</button>
    <button onclick="playMode()">Play</button>
    <button onclick="saveProject()">Save</button>
    <button onclick="loadProject()">Load</button>
    <button onclick="document.getElementById('audioInput').click()">Upload Audio</button>
    <button onclick="exportGame()">Export</button>
    <input type="file" id="audioInput" accept="audio/*" style="display:none;" onchange="handleAudioUpload(this)">
</div>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let mode = "editor";
let currentTool = "wall";
let gameWon = false;
let hasKey = false;

const keys = {};
let bgAudio = null;

const project = {
    objects:[],
    audioData: null 
};

const player = {
    x:100,
    y:100,
    width:30,
    height:30,
    speed:250
};

function handleAudioUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        project.audioData = e.target.result;
        initAudioEngine();
    };
    reader.readAsDataURL(file);
}

function initAudioEngine() {
    if (bgAudio) {
        bgAudio.pause();
    }
    if (project.audioData) {
        bgAudio = new Audio(project.audioData);
        bgAudio.loop = true;
        if (mode === "play") {
            bgAudio.play().catch(()=>{});
        }
    }
}

function handleAudioState() {
    if (!bgAudio) return;
    if (mode === "play" && !gameWon) {
        if (bgAudio.paused) {
            bgAudio.play().catch(()=>{});
        }
    } else {
        if (!bgAudio.paused) {
            bgAudio.pause();
        }
    }
}

window.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
    handleAudioState();
});

window.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("contextmenu",e=>{
    e.preventDefault();
});

canvas.addEventListener("mousedown",e=>{
    handleAudioState();

    if(mode !== "editor") return;

    const rect = canvas.getBoundingClientRect();

    const x = Math.floor(
        (e.clientX - rect.left)/40
    ) * 40;

    const y = Math.floor(
        (e.clientY - rect.top)/40
    ) * 40;

    if(e.button === 0){
        if(currentTool === "spawn") {
            project.objects = project.objects.filter(obj => obj.type !== "spawn");
        }

        project.objects.push({
            type:currentTool,
            x,
            y,
            width:40,
            height:40
        });

    }

    if(e.button === 2){

        project.objects =
            project.objects.filter(obj =>
                !(obj.x === x && obj.y === y)
            );

    }

});

function editorMode(){
    mode = "editor";
    handleAudioState();
}

function playMode(){

    mode = "play";
    gameWon = false;
    hasKey = false;

    const spawnPoint = project.objects.find(obj => obj.type === "spawn");
    if(spawnPoint) {
        player.x = spawnPoint.x + 5; 
        player.y = spawnPoint.y + 5;
    } else {
        player.x = 100;
        player.y = 100;
    }
    
    handleAudioState();

}

async function saveProject(){

    try{

        const handle =
            await window.showSaveFilePicker({

            suggestedName:"MyGame.json",

            types:[{
                description:"Game Project",
                accept:{
                    "application/json":[".json"]
                }
            }]
        });

        const writable =
            await handle.createWritable();

        await writable.write(
            JSON.stringify(project,null,2)
        );

        await writable.close();

        alert("Project saved!");

    }catch(err){

        console.log(err);

    }

}

async function loadProject(){

    try{

        const [handle] =
            await window.showOpenFilePicker({

            types:[{
                description:"Game Project",
                accept:{
                    "application/json":[".json"]
                }
            }]
        });

        const file =
            await handle.getFile();

        const text =
            await file.text();

        const data =
            JSON.parse(text);

        project.objects = data.objects || [];
        project.audioData = data.audioData || null;

        initAudioEngine();

        alert("Project loaded!");

    }catch(err){

        console.log(err);

    }

}

function exportGame(){

    const data =
        JSON.stringify(project);

    const html = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>gameMGE</title>

<style>
body{
    margin:0;
    background:#111;
}
canvas{
    display:block;
    margin:auto;
    background:#223;
}
</style>
</head>
<body>

<canvas id="game" width="1000" height="600"></canvas>

<script>

const project = ${data};

const canvas =
document.getElementById("game");

const ctx =
canvas.getContext("2d");

const keys = {};
let hasKey = false;
let bgAudio = null;
let gameWon = false;

const player = {
    x:100,
    y:100,
    width:30,
    height:30,
    speed:250
};

const spawnPoint = project.objects.find(obj => obj.type === "spawn");
if(spawnPoint) {
    player.x = spawnPoint.x + 5;
    player.y = spawnPoint.y + 5;
}

function startMusic() {
    if (gameWon) return;
    if (project.audioData && !bgAudio) {
        bgAudio = new Audio(project.audioData);
        bgAudio.loop = true;
        bgAudio.play().catch(()=>{});
    } else if (bgAudio && bgAudio.paused) {
        bgAudio.play().catch(()=>{});
    }
}

function stopMusic() {
    if (bgAudio && !bgAudio.paused) {
        bgAudio.pause();
    }
}

window.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
    startMusic();
});

window.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

canvas.addEventListener("mousedown", () => {
    startMusic();
});

function intersects(a,b){

    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );

}

function resetPlayer() {
    const spawn = project.objects.find(obj => obj.type === "spawn");
    if(spawn) {
        player.x = spawn.x + 5;
        player.y = spawn.y + 5;
    } else {
        player.x = 100;
        player.y = 100;
    }
}

function update(dt){
    if (gameWon) return;

    let mx = 0;
    let my = 0;

    if(keys["w"]) my--;
    if(keys["s"]) my++;
    if(keys["a"]) mx--;
    if(keys["d"]) mx++;

    const oldX = player.x;
    const oldY = player.y;

    player.x += mx * player.speed * dt;
    player.y += my * player.speed * dt;

    for(const obj of project.objects){

    // WALL
    if(
        obj.type === "wall" &&
        intersects(player,obj)
    ){
        player.x = oldX;
        player.y = oldY;
    }

    // KEY
    if(
        obj.type === "key" &&
        intersects(player,obj)
    ){
        hasKey = true;

        project.objects =
            project.objects.filter(o => o !== obj);
    }

    // DOOR
    if(
        obj.type === "door" &&
        intersects(player,obj)
    ){
        if(hasKey){

            project.objects =
                project.objects.filter(o => o !== obj);

        }else{

            player.x = oldX;
            player.y = oldY;

        }
    }

    // GOAL
    if(
        obj.type === "goal" &&
        intersects(player,obj)
    ){
        gameWon = true;
        stopMusic();
        
        setTimeout(() => {
            alert("YOU WIN!");
            gameWon = false;
            resetPlayer();
            startMusic();
        }, 50);
    }

}

}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

 for(const obj of project.objects){

    switch(obj.type){

        case "wall":
            ctx.fillStyle = "#777";
            break;

        case "goal":
            ctx.fillStyle = "lime";
            break;

        case "key":
            ctx.fillStyle = "yellow";
            break;

        case "door":
            ctx.fillStyle = "brown";
            break;

        case "spawn":
            ctx.fillStyle = "cyan";
            break;

        default:
            ctx.fillStyle = "red";
    }

    ctx.fillRect(
        obj.x,
        obj.y,
        obj.width,
        obj.height
    );
}

    ctx.fillStyle = "dodgerblue";

    ctx.fillRect(
        player.x,
        player.y,
        player.width,
        player.height
    );

    if (project.audioData && (!bgAudio || bgAudio.paused) && !gameWon) {
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "16px Arial";
        ctx.fillText("Press any key or click canvas to activate level music!", 10, canvas.height - 20);
    }
}

let last = 0;

function loop(time){

    const dt =
        (time-last)/1000;

    last = time;

    update(dt);
    draw();

    requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

<\/script>

</body>
</html>
`;

    const blob =
        new Blob(
            [html],
            {type:"text/html"}
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;
    a.download = "MyGame.html";
    a.click();

    URL.revokeObjectURL(url);

}

function intersects(a,b){

    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );

}

function resetPlayerEngine() {
    const spawnPoint = project.objects.find(obj => obj.type === "spawn");
    if(spawnPoint) {
        player.x = spawnPoint.x + 5;
        player.y = spawnPoint.y + 5;
    } else {
        player.x = 100;
        player.y = 100;
    }
}

function update(dt){

    if(mode !== "play" || gameWon) return;

    let mx = 0;
    let my = 0;

    if(keys["w"]) my--;
    if(keys["s"]) my++;
    if(keys["a"]) mx--;
    if(keys["d"]) mx++;

    const oldX = player.x;
    const oldY = player.y;

    player.x += mx * player.speed * dt;
    player.y += my * player.speed * dt;

  for(const obj of project.objects){

    // WALL
    if(
        obj.type === "wall" &&
        intersects(player,obj)
    ){
        player.x = oldX;
        player.y = oldY;
    }

    // KEY
    if(
        obj.type === "key" &&
        intersects(player,obj)
    ){
        hasKey = true;

        project.objects =
            project.objects.filter(o => o !== obj);
    }

    // DOOR
    if(
        obj.type === "door" &&
        intersects(player,obj)
    ){
        if(hasKey){

            project.objects =
                project.objects.filter(o => o !== obj);

        }else{

            player.x = oldX;
            player.y = oldY;

        }
    }

    // GOAL
    if(
        obj.type === "goal" &&
        intersects(player,obj)
    ){
        gameWon = true;
        resetPlayerEngine();
        handleAudioState();

        setTimeout(() => {
            alert("YOU WIN!");
        }, 50);
    }

}

    }

function drawGrid(){

    ctx.strokeStyle = "#333";

    for(let x=0;x<canvas.width;x+=40){

        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,canvas.height);
        ctx.stroke();

    }

    for(let y=0;y<canvas.height;y+=40){

        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(canvas.width,y);
        ctx.stroke();

    }

}

function draw(){

    ctx.clearRect(
        0,
        0,
        canvas.width,
        canvas.height
    );

    drawGrid();

for(const obj of project.objects){

    if(obj.type === "wall"){
        ctx.fillStyle = "#777";
    }
    else if(obj.type === "goal"){
        ctx.fillStyle = "lime";
    }
    else if(obj.type === "key"){
        ctx.fillStyle = "yellow";
    }
    else if(obj.type === "door"){
        ctx.fillStyle = "brown";
    }
    else if(obj.type === "spawn"){
        ctx.fillStyle = "cyan";
    }
    else{
        ctx.fillStyle = "red";
    }

    ctx.fillRect(
        obj.x,
        obj.y,
        obj.width,
        obj.height
    );
}

    if(mode === "play"){

        ctx.fillStyle = "dodgerblue";

        ctx.fillRect(
            player.x,
            player.y,
            player.width,
            player.height
        );

    }

    ctx.fillStyle = "white";
    ctx.font = "10px sans-serif";
    ctx.fillText("Mode: " + mode,10,20);
    ctx.fillText("Left Click = Place Block",10,40);
    ctx.fillText("Right Click = Delete Block",10,60);

    if (project.audioData && mode === "play" && (!bgAudio || bgAudio.paused) && !gameWon) {
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.font = "14px Arial";
        ctx.fillText("Press any key or click canvas to activate music!", 10, canvas.height - 20);
    }

}

let last = 0;

function loop(time){

    const dt =
        (time-last)/1000;

    last = time;

    update(dt);
    draw();

    requestAnimationFrame(loop);

}

requestAnimationFrame(loop);

</script>

</body>
</html>
